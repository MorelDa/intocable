<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intocable - Ver Online</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #0a0a0a; color: #fff; min-height: 100vh; }
        
        .main-hero {
            position: relative;
            min-height: 100vh;
            background: linear-gradient(to bottom, rgba(0,0,0,0.7), #0a0a0a),
                        url('https://compucalitv.tv/wp-content/uploads/thumbs/a34b8c710565cd4da47ef15ec488f3df_hd.webp') center top/cover no-repeat fixed;
        }
        
        .content-wrapper {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 40px;
            align-items: start;
        }
        
        @media (max-width: 900px) {
            .content-wrapper { grid-template-columns: 1fr; text-align: center; }
            .poster-side { display: flex; justify-content: center; }
        }
        
        .poster-side img {
            width: 100%;
            max-width: 280px;
            border-radius: 12px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
        }
        
        .info-side { padding-top: 20px; }
        
        .meta-badges {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 15px;
            align-items: center;
        }
        
        @media (max-width: 900px) { .meta-badges { justify-content: center; } }
        
        .badge {
            background: linear-gradient(135deg, #ff4b2b, #ff416c);
            padding: 6px 14px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .badge-outline {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.3);
            color: #ccc;
        }
        
        .movie-title {
            font-size: 42px;
            font-weight: 900;
            margin-bottom: 10px;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.8);
        }
        
        .movie-genre {
            color: #888;
            font-size: 14px;
            margin-bottom: 20px;
        }
        
        .synopsis {
            color: #bbb;
            line-height: 1.8;
            font-size: 15px;
            margin-bottom: 30px;
            max-width: 600px;
        }
        
        @media (max-width: 900px) { .synopsis { margin: 0 auto 30px; } }
        
        .play-btn {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            background: linear-gradient(135deg, #ff4b2b, #ff416c);
            color: white;
            padding: 16px 40px;
            border: none;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 10px 30px rgba(255,75,43,0.4);
            transition: all 0.3s ease;
        }
        
        .play-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(255,75,43,0.6);
        }
        
        .play-btn svg { width: 24px; height: 24px; }
        
        /* Player Modal */
        #player-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            padding: 20px;
            overflow-y: auto;
        }
        
        #player-modal.active { display: flex; flex-direction: column; align-items: center; }
        
        .modal-header {
            width: 100%;
            max-width: 1100px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .modal-title {
            font-size: 18px;
            font-weight: 600;
        }
        
        .close-btn {
            background: rgba(255,255,255,0.1);
            border: none;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-size: 24px;
            cursor: pointer;
            transition: background 0.3s;
        }
        
        .close-btn:hover { background: rgba(255,255,255,0.2); }
        
        .servers-container {
            width: 100%;
            max-width: 1100px;
            margin-bottom: 15px;
        }
        
        .servers-label {
            font-size: 12px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }
        
        .servers-list {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .server-btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.1);
            color: #ccc;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .server-btn:hover {
            background: rgba(255,255,255,0.15);
            border-color: rgba(255,255,255,0.2);
        }
        
        .server-btn.active {
            background: linear-gradient(135deg, #ff4b2b, #ff416c);
            border-color: transparent;
            color: white;
            box-shadow: 0 4px 15px rgba(255,75,43,0.4);
        }
        
        .player-container {
            width: 100%;
            max-width: 1100px;
            aspect-ratio: 16/9;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }
        
        .player-frame {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>
    <section class="main-hero">
        <div class="content-wrapper">
            <div class="poster-side">
                <img src="https://compucalitv.tv/wp-content/uploads/thumbs/a34b8c710565cd4da47ef15ec488f3df_hd.webp" alt="Intocable">
            </div>
            <div class="info-side">
                <div class="meta-badges">
                    <span class="badge">Película</span>
                    
                    
                    
                </div>
                <h1 class="movie-title">Intocable</h1>
                <p class="movie-genre"></p>
                <p class="synopsis"></p>
                <button class="play-btn" onclick="togglePlayer()">
                    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
                    VER AHORA
                </button>
            </div>
        </div>
    </section>

    <div id="player-modal">
        <div class="modal-header">
            <span class="modal-title">Intocable</span>
            <button class="close-btn" onclick="togglePlayer()">×</button>
        </div>
        <div class="servers-container">
            <p class="servers-label">Seleccionar Servidor</p>
            <div class="servers-list">
                <button class="server-btn active" onclick="changeServer(0)" data-server="0">Servidor 1</button>

            </div>
        </div>
        <div class="player-container">
            <iframe id="player-0" class="player-frame" src="https://vimeos.net/embed-er1mxu6gbqrz.html" style="display:block" allowfullscreen sandbox="allow-scripts allow-same-origin"></iframe>

        </div>
    </div>

    <script>
        let currentServer = 0;
        const totalServers = 1;
        
        function togglePlayer() {
            const modal = document.getElementById('player-modal');
            modal.classList.toggle('active');
            document.body.style.overflow = modal.classList.contains('active') ? 'hidden' : '';
        }
        
        function changeServer(index) {
            // Hide all players
            for (let i = 0; i < totalServers; i++) {
                document.getElementById('player-' + i).style.display = 'none';
                document.querySelector('[data-server="' + i + '"]').classList.remove('active');
            }
            // Show selected player
            document.getElementById('player-' + index).style.display = 'block';
            document.querySelector('[data-server="' + index + '"]').classList.add('active');
            currentServer = index;
        }
        
        // Disable right click
        document.addEventListener('contextmenu', e => e.preventDefault());
    </script>
</body>
</html>
